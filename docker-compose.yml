services:
  recalbox-dashboard:
    image: ghcr.io/m-meddah/recalbox-dashboard:latest
    container_name: recalbox-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - recalbox-data:/data
    environment:
      RECALBOX_HOST: ${RECALBOX_HOST:-recalbox.local}
      RECALBOX_SSH_USER: ${RECALBOX_SSH_USER:-root}
      RECALBOX_SSH_PASSWORD: ${RECALBOX_SSH_PASSWORD:-recalboxroot}
      RECALBOX_SSH_PORT: ${RECALBOX_SSH_PORT:-22}
      RECALBOX_MQTT_PORT: ${RECALBOX_MQTT_PORT:-1883}
      TZ: ${TZ:-Europe/Paris}

volumes:
  recalbox-data:
